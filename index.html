<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrar no Grupo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        padding: 24px;
      }

      .whatsapp-icon {
        width: 72px;
        height: 72px;
        margin-bottom: 20px;
      }

      .container {
        text-align: center;
        max-width: 320px;
      }

      .container h1 {
        font-size: 1.2rem;
        color: #222;
        margin-bottom: 8px;
        font-weight: 700;
      }

      .container p {
        font-size: 0.9rem;
        color: #666;
        margin-bottom: 20px;
        line-height: 1.4;
      }

      .btn-whatsapp {
        display: inline-block;
        padding: 14px 32px;
        background: #25d366;
        color: white;
        text-decoration: none;
        border-radius: 28px;
        font-weight: 600;
        font-size: 1rem;
        transition: background 0.2s;
        box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
      }

      .btn-whatsapp:active {
        background: #1da851;
      }

      .spinner {
        width: 24px;
        height: 24px;
        border: 3px solid #e0e0e0;
        border-top-color: #25d366;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        font-size: 0.85rem;
        color: #999;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <svg
      class="whatsapp-icon"
      viewBox="0 0 24 24"
      fill="#25d366"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"
      />
    </svg>

    <!-- Estado 1: Loading (navegador normal) -->
    <div class="container" id="loading-state">
      <div class="spinner"></div>
      <p class="loading-text">Redirecionando...</p>
    </div>

    <!-- Estado 2: Botão manual (in-app browsers) -->
    <div class="container hidden" id="button-state">
      <h1>Grupo de Ofertas 🎸</h1>
      <p>Toque no botão abaixo para entrar no grupo do WhatsApp</p>
      <a
        id="main-btn"
        class="btn-whatsapp"
        href="#"
        target="_blank"
        rel="noopener noreferrer"
        >Entrar no Grupo</a
      >
    </div>

    <script>
      (function () {
        var groupUrl = 'https://chat.whatsapp.com/KBo7ud8DLbzBzBr42e0ozr';

        // Counter
        fetch(
          'https://api.counterapi.dev/v1/guitar-pedals-redirect/page-views/up'
        ).catch(function () {});

        var ua = navigator.userAgent || '';

        // Detecta in-app browsers (Facebook, Instagram, Messenger, TikTok, Twitter, LinkedIn, etc.)
        var isInApp =
          /FBAN|FBAV|Instagram|Messenger|musical_ly|TikTok|BytedanceWebview|Twitter|LinkedInApp/i.test(
            ua
          );

        var loadingState = document.getElementById('loading-state');
        var buttonState = document.getElementById('button-state');
        var mainBtn = document.getElementById('main-btn');

        if (isInApp) {
          // ===== IN-APP BROWSER =====
          // Estratégia: Mostrar botão imediatamente com target="_blank"
          // No Instagram/Facebook in-app browser, target="_blank" geralmente
          // abre no navegador externo do sistema (Safari/Chrome)
          loadingState.classList.add('hidden');
          buttonState.classList.remove('hidden');
          mainBtn.href = groupUrl;

          // Também tenta o truque de window.open que em alguns in-app browsers
          // força abertura externa
          mainBtn.addEventListener('click', function (e) {
            // Counter de cliques no botão
            fetch(
              'https://api.counterapi.dev/v1/guitar-pedals-redirect/button-clicks/up'
            ).catch(function () {});

            // Tenta abrir via window.open (alguns in-app browsers abrem externamente)
            var win = window.open(groupUrl, '_system');
            if (win) {
              e.preventDefault();
            }
            // Se window.open falhar, o href normal com target="_blank" será usado
          });
        } else {
          // ===== NAVEGADOR NORMAL =====
          // Redirect direto funciona perfeitamente
          window.location.href = groupUrl;
        }
      })();
    </script>
  </body>
</html>
