<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grupo Exclusivo - Guitar Pedals</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(
          135deg,
          #075e54 0%,
          #128c7e 50%,
          #25d366 100%
        );
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 16px;
        padding: 40px 32px;
        max-width: 400px;
        width: 100%;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }

      .whatsapp-icon {
        width: 64px;
        height: 64px;
        margin-bottom: 20px;
      }

      h1 {
        font-size: 1.4rem;
        color: #1a1a1a;
        margin-bottom: 12px;
      }

      p {
        font-size: 1rem;
        color: #666;
        margin-bottom: 24px;
        line-height: 1.5;
      }

      .loader {
        display: inline-block;
        width: 40px;
        height: 40px;
        border: 4px solid #e0e0e0;
        border-top-color: #25d366;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .manual-link {
        display: inline-block;
        margin-top: 24px;
        padding: 12px 24px;
        background: #25d366;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 0.95rem;
        transition: background 0.2s;
      }

      .manual-link:hover {
        background: #128c7e;
      }
    </style>
  </head>
